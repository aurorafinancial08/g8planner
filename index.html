<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G8 Planner Studio</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f7f3ee;
  color: #2b2b2b;
  text-align: center;
}

/* HEADER */
header {
  padding: 80px 20px;
  background: linear-gradient(135deg, #f8efe4, #f2e2c7);
}

h1 {
  color: #caa14a;
  font-size: 48px;
  margin-bottom: 10px;
}

header p {
  font-size: 18px;
  margin-bottom: 25px;
}

/* BOTONES */
.btn {
  background: linear-gradient(135deg, #d4af37, #b8962e);
  color: white;
  padding: 14px 28px;
  text-decoration: none;
  border-radius: 25px;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

/* PRODUCTOS */
.products {
  padding: 60px 20px;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 30px;
}

/* TARJETAS */
.card {
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 260px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.card h3 {
  color: #caa14a;
}

/* FOOTER */
footer {
  padding: 20px;
  background: #efe3d3;
  margin-top: 40px;
  font-size: 14px;
}

</style>
</head>

<body>

<header>
  <h1>G8 Planner Studio</h1>
  <p>Organize your life with style ✨</p>
  <a class="btn" href="#">Shop Now</a>
</header>

<section class="products">

  <div class="card">
    <h3>Weekly Planner</h3>
    <p>Organize your week beautifully.</p>
    <a class="btn" href="#">Buy</a>
  </div>

  <div class="card">
    <h3>Monthly Calendar</h3>
    <p>Plan your month with elegance.</p>
    <a class="btn" href="#">Buy</a>
  </div>

  <div class="card">
    <h3>Study Schedule</h3>
    <p>Perfect for students and work routines.</p>
    <a class="btn" href="#">Buy</a>
  </div>

</section>

<footer>
  © 2026 G8 Planner Studio ✨
</footer>

</body>
</html>
