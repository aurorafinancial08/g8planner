<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G8 Planner Studio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fffaf5;
      color: #2b2b2b;
      text-align: center;
    }

    header {
      padding: 60px 20px;
      background: linear-gradient(135deg, #fdf6ec, #f8ead8);
    }

    h1 {
      color: #c9a227;
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      background: #c9a227;
      color: white;
      padding: 14px 24px;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
      margin-top: 15px;
    }

    .btn:hover {
      background: #b38f1d;
    }

    .products {
      padding: 50px 20px;
    }

    .card {
      background: #ffffff;
      margin: 15px;
      padding: 25px;
      border-radius: 18px;
      display: inline-block;
      width: 260px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      vertical-align: top;
    }

    .card h3 {
      color: #c9a227;
    }

    footer {
      padding: 20px;
      background: #f3e7d6;
      margin-top: 30px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <header>
    <h1>G8 Planner Studio</h1>
    <p>Organize your life with style ✨</p>
    <a class="btn" href="#">Shop Now</a>
  </header>

  <section class="products">
    <div class="card">
      <h3>Weekly Planner</h3>
      <p>Organize your week beautifully.</p>
      <a class="btn" href="#">Buy</a>
    </div>

    <div class="card">
      <h3>Monthly Calendar</h3>
      <p>Plan your month with elegance.</p>
      <a class="btn" href="#">Buy</a>
    </div>

    <div class="card">
      <h3>Study Schedule</h3>
      <p>Perfect for students and work routines.</p>
      <a class="btn" href="#">Buy</a>
    </div>
  </section>

  <footer>
    © 2026 G8 Planner Studio - Digital designs made with love
  </footer>

</body>
</html>
